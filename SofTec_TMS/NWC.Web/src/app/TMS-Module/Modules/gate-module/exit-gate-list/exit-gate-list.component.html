<div class="container-fluid main-div">
  <div class="row">
    <div class="col-md-6  padding-10">
      <span class="page-title">{{'gates' | translate}}</span>
      <span class="page-title"> <i class="fa fa-chevron-right"></i></span>
      <span class="page-title  currentpage">{{'exit gate' | translate}}</span>
    </div>
  </div>
</div>
<div class="inner-div">
  <div class="row form-row">
    <div class="col-md-6">
      <label class="col-sm-3 title">{{'vehicle' | translate}}</label>
      <div class="col-sm-6">
        <input class="form-control" 
          [(ngModel)]="vehicleSearchText" 
          (keyup.enter)="this.onSearchSubmit()" 
          placeholder="{{ 'Search...' | translate }}" >
        
        <!-- <select-menu [label]="'Name'" [itemKey]="'Id'"
                     [dropDownListInputs]="vehicleList"
                     (SearchVAlue)="getVehicles($event)"
                     (selectedListChange)="onVehicleDDLChanged($event)"
                     [options]="selectMenuOptions"
                     [selectedList]="bindingModel_Vehicles"
                     [loading]="Vehicle_loading">
        </select-menu> -->
      </div>
    </div>
    <div class="col-md-6">
      <label class="col-sm-3 title">{{'order number' | translate}} </label>
      <div class="col-sm-6">
      <input class="form-control" 
        [(ngModel)]="searchCriteria.WorkOrderNumber" 
        (keyup.enter)="this.onSearchSubmit()" 
        placeholder="{{ 'Search...' | translate }}" >
      
      <!-- <search-component class="col-md-6" (searchKeyword)="onWorkOrderDDLChanged($event)"
        (searchClicked)="onWorkOrderDDLClicked($event)"
        [isTypeahead]="true"
        [typeaheadFunction]='getWorkOrderNumbers.bind(this)' [field]="'Name'"
        [(_value)]="searchCriteria.WorkOrderNumber">
      </search-component> -->
    </div>
    </div>
    <!--<div class="col-md-3">
    </div>-->
  </div>
  <div class="row form-row">
    <div class="col-md-6">
      <label class="col-sm-3 title"> {{'permission' | translate}}</label>
      <div class="col-sm-6">
        <input class=" form-control" 
          [(ngModel)]="driverSearchText" 
          (keyup.enter)="this.onSearchSubmit()" 
          placeholder="{{ 'Search...' | translate }}" >
        <!-- <select-menu [label]="'Name'" [itemKey]="'Id'"
        [dropDownListInputs]="driverList"
        (SearchVAlue)="getDrivers($event)"
        (selectedListChange)="onDriverDDLChanged($event)"
        [options]="selectMenuOptions"
        [selectedList]="bindingModel_Drivers"
        [loading]="Driver_Loading">
      </select-menu> -->
      </div>
    </div>
   
    <div class="col-md-6">
      <button class="btn btn-default margin-5 pull-right" (click)="clearSearch()">{{ 'Clear'| translate }}</button>
      <button class="btn btn-danger margin-5 pull-right" (click)="onSearchSubmit()">{{ 'Search' | translate }}</button>
    </div>
  </div>
  <h4 class="ttl">{{'out for delivery tankers' | translate}} <span>{{'exit' | translate}}</span></h4>
  <div class="row form-row holder-list-vehicles">
    <div class="col-md-12">
    
      <!-- available vehicles -->
      <div class="col-md-6 flot-ar">
        <ul class="list-tankers">
          <li *ngFor="let item of AvailableVehicles.Result; let i = index">
            <div class="box-data" [style.border-right-color]= "'#ff0000'"
            [style.border-left-color]= "'#ff0000'"  >
            <!-- <div class="box-data" [style.border-right-color]= "item.VehicleStatusColorCode"
            [style.border-left-color]= "item.VehicleStatusColorCode"  > -->
              <div class="row">
                <div class="col-md-9">
                  <label class="tanker">
                    <i class="fa fa-truck"></i>
                    <span class="tanker-plt">{{item.VehicleCode}} | {{item.VehicleCodePlateNo}} - </span>
                    <span> {{item.Capacity}} {{'M'| translate}}<sup>3</sup> - </span>
                    <span class="stat">{{ (IsArabic ? item.VehicleStatusNameAr : item.VehicleStatusName) }}</span>
                  </label>
                  <label class="tanker-name">
                    <i class="fa fa-user"></i> <span class="name">{{item.DriverName}} | {{item.DriverCode}}</span>
                    <span class="mob">{{item.DriverMobileNumber}}</span>
                  </label>
                  <label class="tanker-name" *ngIf="item.Expirationdate">
                    <i class="fa fa-credit-card"></i>
                    <span class="name">{{ item.PermitNumber  }} | {{ item.PermitStatus }} |</span>
                  </label>
                </div>
                <div class="col-md-3">
                  <a class="btn btn-danger back-whitegreen mb-1 wid100" *ngIf="item.CitySettings_ShowInvoice"
                    routerLink="/tms/gate/printVehicle/{{item.VehicleID}}" rel="noopener noreferrer" >
                      {{'print ticket' | translate}}</a> 
                  <button class="btn btn-default wid100" 
                    (click)="onOutForParking(item.VehicleID)">
                    {{'OutForParking' | translate}}</button>
                </div>
              </div>
            </div>
          </li>
        </ul>

      </div>

      <!-- out for delivery vehicles -->
      <div class="col-md-6 flot-ar">
        <ul class="list-tankers">
          <li *ngFor="let item of searchResult.Result; let i = index">
            <div class="box-data"  [style.border-right-color]= "'#4caf50'"
            [style.border-left-color]= "'#4caf50'"  >
            <!-- <div class="box-data"  [style.border-right-color]= "item.VehicleStatusColorCode"
            [style.border-left-color]= "item.VehicleStatusColorCode"  > -->
              <div class="row">
                <div class="col-md-9">
                  <span class="cod">#{{item.WorkOrderNumber}}</span>
                  <date [date]="item.OrderCreateTime" class="mr-2 ml-2" [ShowTime]="true"></date>
                  <label class="tanker">
                    <i class="fa fa-truck"></i>
                    <span class="tanker-plt">{{item.VehicleCode}} | {{item.VehicleCodePlateNo}} - </span>
                    <span> {{item.Capacity}} {{'M'| translate}}<sup>3</sup> - </span>
                    <span class="stat">{{item.VehicleStatusName}}</span>
                  </label>
                  <label class="tanker-name">
                    <i class="fa fa-user"></i> <span class="name">{{item.DriverName}} | {{item.DriverCode}}</span>
                    <span class="mob">{{item.DriverMobileNumber}}</span>
                  </label>
                  <label class="tanker-name" *ngIf="item.Expirationdate">
                    <i class="fa fa-credit-card"></i>
                    <span class="name">{{ item.PermitNumber  }} | {{ item.PermitStatus }} |</span>
                  </label>
                </div>
                <div class="col-md-3">
                      
                      <a class="btn btn-danger back-whitegreen mb-1 wid100" *ngIf="item.CitySettings_ShowInvoice" 
                        routerLink="/tms/gate/print/{{item.VehicleID}}/{{item.WorkOrderID}}" >
                          {{'print ticket' | translate}}</a> 
                      
                      <button class="btn btn-default wid100" (click)="onOutForDelivery(item)"> {{'out for delivery' | translate}} </button>
                </div>
              </div>
            </div>
          </li>
        </ul>
      </div>


    </div>
  </div>
</div>
