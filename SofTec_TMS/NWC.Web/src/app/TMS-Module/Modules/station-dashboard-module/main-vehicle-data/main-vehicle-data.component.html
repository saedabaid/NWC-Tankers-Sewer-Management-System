<div class="row">
  <div class="w-20 p-2 d-flex flex-column  align-self-center justify-content-center">
      <img class="img" src="{{carImageUrl}}" alt="Total Tankers">
      <div class="font-10">{{'FSD_TotalTankers' | translate}}</div>
      <div *ngIf="loading_totalTankers" class="text-center">
        <img class="loading-width" src={{ImageUrl}} />
      </div>
      <div *ngIf="!loading_totalTankers" class="text-center font-16 font-weight-bold">{{count_totalTankers}}</div>
  </div>
  
  
  <div class="w-20 p-2 d-flex flex-column  align-self-center justify-content-center">
    <img class="img" src="{{carImageUrl}}" alt="Total Tankers">
    <div class="font-10">{{'FSD_AvailableTankers' | translate}}</div>
    <div *ngIf="loading_availableTankers" class="text-center">
      <img class="loading-width" src={{ImageUrl}} />
    </div>
    <div *ngIf="!loading_availableTankers" class="text-center font-16 font-weight-bold">{{count_availableTankers}}</div>
  </div>

  <div class="w-20 p-2 d-flex flex-column  align-self-center justify-content-center">
    <img class="img" src="{{carImageUrl}}" alt="Total Tankers">
    <div class="font-10">{{'FSD_InServiceTankers' | translate}}</div>
    <div *ngIf="loading_inServiceTankers" class="text-center">
      <img class="loading-width" src={{ImageUrl}} />
    </div>
    <div *ngIf="!loading_inServiceTankers" class="text-center font-16 font-weight-bold">{{count_inServiceTankers}}</div>
  </div>
</div>
