<div class="holder-table">
  <div *ngIf ="IsNoComplaints else complaints " style="text-align: center;"> {{ 'NoComplaintsFound' | translate}} </div>
  <ng-template #complaints>
      <div  class="box-data" *ngFor="let com of Complaints.listComplaints; let i =  index">
          <div class="row">
            <div class="line">
              <div class="col-md-5 pd-0">
                <label>
                  <span class="state">{{com.StatusEn}}</span>
                  <span class="cod">#{{com.ComplaintNumber}}</span>
                </label>
              </div>
              <div class="col-md-5 border-lf">
                <span class="desc">{{com.Description}}</span>
              </div>
            </div>
          </div>
          <div class="row">
        
            <div class="line-2">
        
            
            <div class="col-md-5">
              <div class="col-xs-6">
                <span class="by"> <i class="fab fa-js-square"></i> {{'raised by' | translate}}  </span>
                <span class="name">{{com.RaisedByName}}</span>
              </div>
              <div class="col-xs-6 sml-border-lf">
                <span class="loc">  {{'raised at' | translate}} </span>
             
                <date [date]="com.RaisedTime"  [ShowTime]="true"></date>   
                <!-- <span class="time"> {{new Date().valueOf() - new Date( com.RaisedTime ).valueOf()}}</span> -->
              </div>
            </div>
            <div class="col-md-5 border-lf">
              <div class="col-xs-6">
                <label class="cat">  {{'category' | translate}} <span> {{ com.PriorityEn }}</span></label>
              </div>
              <div class="col-xs-6">
                <label class="pri"> {{'priority' | translate}}  <span> {{com.CategoryEn}}</span></label>
        
              </div>
            </div>
            </div>
          </div>
        </div>
  </ng-template>

</div>
