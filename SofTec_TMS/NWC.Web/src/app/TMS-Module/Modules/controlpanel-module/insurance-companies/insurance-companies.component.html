<div class="container-fluid main-div bg-light">
  <div class="row">
    <div class="col-md-6 padding-10">
      <span class="page-title">{{ 'ControlPanel' | translate }}</span>
      <span class="page-title"><i class="fa fa-chevron-right"></i></span>

      <span class="page-title currentpage">{{ 'InsuranceCompanies' | translate }}</span>
    </div>

    <div class="col-md-6 justify-content-end d-flex">
      <a
        *ngIf="
          pagePermission == 'Full Control' || pagePermission == 'Add and Edit'
        "
        routerLink="create"
        title="  {{ 'NewInsuranceCompanies' | translate }}"
      >
        <i class="glyphicon glyphicon-plus-sign p-2"></i>
      </a>

    </div>
  </div>
</div>
<div class="inner-div">
  <div class="row form-row">
    <div class="col-md-12 custome-dropdown row">
      <div class="col-md-12">
        <label class="title mr-3">{{ 'Keyword' | translate }}</label>

        <input
          class="w-25 mr-2 d-inline-block form-control shadow-sm bg-white rounded"
          [(ngModel)]="SearchCriteria.FilterModel.SearchKeyword"
          (keyup.enter)="onSearchSubmit()"
          placeholder="{{ 'Search...' | translate }}"
        />

        <button class="btn btn-default margin-5" (click)="clearSearch()">
          {{ 'Clear' | translate }}
        </button>
        <button class="btn btn-danger margin-5" (click)="onSearchSubmit()">
          {{ 'Search' | translate }}
        </button>


      </div>
    </div>
  </div>


  <!-- fixed header  -->
  <div [class]="advancedDiv ? 'table-advans' : 'table-heigh' + ' row'">
    <div class="col-md-12 scroll-x-table">
      <!--#region  table loading ********************************************** -->
      <div [ngClass]="tableLoading ? 'container-gif show' : 'container-gif'">
        <div class="uil-ring-css table-loader" style="transform: scale(0.6);">
          <div></div>
        </div>
      </div>
      <!--#endregion  table loading -->

      <table class="table table-striped">
        <thead>
          <tr>

            <th class="wid130">{{ 'StaffCode' | translate }}</th>
            <th class="wid100">{{ 'Name' | translate }}</th>
            <th class="wid130">{{ 'Allocation' | translate }}</th>
            <th class="wid130">{{ 'Role' | translate }}</th>

            <th class="wid100"></th>
            <th class="wid130"></th>
          </tr>
        </thead>
        <tbody [class]="advancedDiv ? ' mini' : ' '">
          <tr class="text-center p-2 font-4" *ngIf="!searchResult.Result">
            <td colspan="13">
              {{ 'NoDataFound' | translate }}
            </td>
          </tr>
          <tr *ngFor="let item of searchResult.Result; let i = index">
            <td class="wid130">{{ item.StaffCode }}</td>
            <td class="wid100">{{ item.StaffName }}</td>
            <td class="wid130">{{ item.Allocation }}</td>
            <td class="wid130">{{ item.StaffRole }}</td>
            <td class="wid130">
              <button class="btn btn-link" (click)="editItem(item.Id)">
                <i class="fas fa-pen"></i>
              </button>
            </td>
            <td class="wid130">
              <button class="btn btn-link" (click)="deleteItem(item.Id)">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <app-pagination-component
    [ItemsCount]="searchResult.TotalCount"
    [(PageSize)]="this.SearchCriteria.FilterModel.PageFilter.PageSize"
    [pageIndex]="this.SearchCriteria.FilterModel.PageFilter.PageIndex"
    (PageSizeChange)="onPageSizeChanged($event)"
    (pageNavigated)="onPageIndexChanged($event)"
  ></app-pagination-component>
</div>
